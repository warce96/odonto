<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Clínico</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
body {
    margin: 0;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    z-index: 2;

    background: #0f172a;
    color: white;
    padding: 20px;

    border-right: 1px solid rgba(255,255,255,0.05);
}

/* LOGO / TITLE */
.sidebar h4 {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
    opacity: 0.9;
}

/* MENU */
.sidebar a {
    display: flex;
    align-items: center;
    gap: 10px;

    color: #94a3b8;
    padding: 10px 12px;
    border-radius: 8px;
    text-decoration: none;
    margin-bottom: 6px;

    font-size: 14px;
    transition: 0.15s;
}

.sidebar a:hover {
    background: rgba(37,99,235,0.15);
    color: white;
}

/* ICONOS */
.icon {
    width: 18px;
    height: 18px;
    opacity: 0.8;
}

/* ===== MAIN ===== */
.main {
    margin-left: 240px;
    padding: 30px;
}

/* ===== TOPBAR ===== */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;

    margin-bottom: 25px;
}

.topbar h4 {
    font-weight: 600;
    font-size: 18px;
}

.welcome {
    font-size: 13px;
    color: #64748b;
}

/* ===== CARDS ===== */
.card {
    border: none;
    border-radius: 12px;

    background: white;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.05);

    transition: 0.15s;
}

.card:hover {
    transform: translateY(-2px);
}

/* ===== INPUTS ===== */
.form-control {
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    padding: 10px;
}

.form-control:focus {
    border-color: #2563eb;
    box-shadow: none;
}

/* ===== BOTONES ===== */
.btn {
    border-radius: 8px;
    font-size: 14px;
}

.btn-success {
    background: #16a34a;
    border: none;
}

.btn-success:hover {
    background: #15803d;
}

/* ===== TABLA ===== */
.table {
    border-radius: 10px;
    overflow: hidden;
}

.table thead {
    font-size: 12px;
    text-transform: uppercase;
    color: #64748b;
}

.table tbody tr:hover {
    background: #f9fafb;
}

/* ===== BADGES ===== */
.badge {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
}

/* ===== ALERTAS ===== */
.estado-vencido {
    background: #dc2626;
    color: white;
}

.estado-hoy {
    background: #111827;
    color: white;
}

.estado-semana {
    background: #facc15;
    color: black;
}

.estado-mes {
    background: #0ea5e9;
    color: white;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>Sistema Clínico</h4>

    <a href="/">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 13h8V3H3v10zm10 8h8v-6h-8v6zM3 21h8v-6H3v6zm10-10h8V3h-8v8z"/>
        </svg>
        Dashboard
    </a>

    <a href="/clientes">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.96 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        Pacientes
    </a>

    <a href="/ficha">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
        </svg>
        Nueva Ficha
    </a>

    <a href="/pagos">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 7H3V5h18v2zm0 4H3v8h18v-8zm-4 6H7v-2h10v2z"/>
        </svg>
        Cobros
    </a>

    <a href="/logout">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 17l5-5-5-5v10zM4 19h8v2H4zM4 3h8v2H4z"/>
        </svg>
        Salir
    </a>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h4>Panel General</h4>
        <div class="welcome">Dr. Sebastian Zimerliz</div>
    </div>

    {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
