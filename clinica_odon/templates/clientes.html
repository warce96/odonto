{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">👤 Gestión de Clientes</h2>

<!-- FORMULARIO -->
<div class="card p-4 mb-4">

<form method="POST">

<div class="row">
    <div class="col-md-4">
        <input name="nombre" placeholder="Nombre" class="form-control" required>
    </div>
    <div class="col-md-4">
        <input name="ci" placeholder="CI" class="form-control">
    </div>
    <div class="col-md-4">
        <input name="telefono" placeholder="Teléfono" class="form-control">
    </div>
</div>

<button class="btn btn-success mt-3">➕ Guardar Cliente</button>

</form>

</div>

<!-- TABLA -->
<div class="card p-3">

<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
    <th>👤 Nombre</th>
    <th>🆔 CI</th>
    <th>📞 Teléfono</th>
    <th class="text-center">⚙ Acciones</th>
</tr>
</thead>

<tbody>

{% for c in clientes %}
<tr>

<td><strong>{{ c.nombre }}</strong></td>
<td>{{ c.ci }}</td>
<td>{{ c.telefono }}</td>

<td class="text-center">

    <!-- 🔥 BOTÓN HISTORIAL -->
    <a href="/historial/{{ c.id }}" class="btn btn-sm btn-info text-white">
        📋 Historial
    </a>

    <!-- OPCIONAL FUTURO -->
    <!--
    <a href="#" class="btn btn-sm btn-warning">Editar</a>
    <a href="#" class="btn btn-sm btn-danger">Eliminar</a>
    -->

</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
