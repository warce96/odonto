<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Clínica Dental</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* ===== LAYOUT ===== */
.container-login {
    display: flex;
    height: 100vh;
}

/* ===== LADO IZQUIERDO ===== */
.left {
    width: 55%;
    position: relative;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    overflow: hidden;
}

/* TEXTO */
.overlay {
    position: relative;
    z-index: 2;
    padding: 80px;
    color: white;
}

.overlay h1 {
    font-size: 40px;
    font-weight: 600;
}

.overlay p {
    color: #94a3b8;
}

/* ===== PARTICULAS ===== */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(59,130,246,0.6);
    border-radius: 50%;
    animation: float 10s infinite linear;
}

@keyframes float {
    from {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
    }
    20% { opacity: 1; }
    to {
        transform: translateY(-10vh) translateX(50px);
        opacity: 0;
    }
}

/* ===== LADO DERECHO ===== */
.right {
    width: 45%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e2e8f0;
}

/* ===== GLASS CARD ===== */
.login-box {
    width: 380px;
    padding: 40px;
    border-radius: 20px;

    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);

    box-shadow: 0px 25px 60px rgba(0,0,0,0.15);

    animation: fadeIn 0.6s ease;
}

/* ICONO */
.login-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-radius: 50%;
    margin: -70px auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0px 10px 25px rgba(37,99,235,0.4);
}

/* ===== INPUT ANIMADO ===== */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    outline: none;
    transition: 0.3s;
}

.input-group label {
    position: absolute;
    left: 12px;
    top: 12px;
    color: #64748b;
    transition: 0.3s;
    pointer-events: none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    font-size: 12px;
    background: white;
    padding: 0 5px;
    color: #2563eb;
}

/* ===== VALIDACION ===== */
input:invalid {
    border-color: #ef4444;
}

input:valid {
    border-color: #22c55e;
}

/* BOTON */
.btn-login {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.btn-login:hover {
    transform: scale(1.05);
}

/* TEXTO */
.small-text {
    font-size: 13px;
    color: #64748b;
}

/* ANIMACION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

</style>

</head>

<body>

<div class="container-login">

    <!-- IZQUIERDA -->
    <div class="left">

        <div class="overlay">
            <h1>Clínica Dental</h1>
            <p>Sistema de gestión clínica profesional</p>
        </div>

        <!-- partículas dinámicas -->
        <script>
            for(let i=0;i<40;i++){
                let p = document.createElement("div")
                p.className = "particle"
                p.style.left = Math.random()*100 + "%"
                p.style.animationDuration = (6 + Math.random()*6) + "s"
                document.querySelector(".left").appendChild(p)
            }
        </script>

    </div>

    <!-- DERECHA -->
    <div class="right">

        <form method="POST" class="login-box">

            <div class="login-icon">
                <svg width="28" height="28" fill="white" viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
                </svg>
            </div>

            <h4 class="text-center mb-4">Iniciar Sesión</h4>

            <div class="input-group">
                <input type="text" name="username" required placeholder=" ">
                <label>Usuario</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required placeholder=" ">
                <label>Contraseña</label>
            </div>

            <div class="d-flex justify-content-between small-text mb-3">
                <div><input type="checkbox"> Recordarme</div>
                <div>¿Olvidó contraseña?</div>
            </div>

            <button class="btn-login">Ingresar</button>

        </form>

    </div>

</div>

</body>
</html>
